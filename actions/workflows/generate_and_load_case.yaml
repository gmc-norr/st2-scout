
version: 1.0

description: Build Scout load config for a case, and load into scout and loqusdb. 

input:
  - case_id
  - sample_ids
  - pipeline
  - analysis_id
  - output_path

output:
  - load_config_path: <% ctx().load_config_path %>

tasks:

  get_sample_files:
    with: sample_id in <% ctx().sample_ids %>
    action: cleve.get_analysis_files
    input:
      analysis_id: <% ctx().analysis_id %>
      parent_id: <% item(sample_id) %>
      level: sample
    next:
      - when: <% succeeded() %>
        publish:
          - sample_files: <% dict(zip(ctx().sample_ids, result().select($.result.body))) %>
        do: generate_load_config

  get_case_files:
    action: cleve.get_analysis_files
    input:
      analysis_id: <% ctx().analysis_id %>
      level: case
      parent_id: <% ctx().case_id %>
    next:
      - when: <% succeeded() %>
        publish:
          - case_files: <% result().result.body %>
        do: generate_load_config

  get_sample_info:
    with: sample_id in <% ctx().sample_ids %>
    action: igene.get_sample
    input:
      sample_id: <% item(sample_id) %>
    next:
      - when: <% succeeded() %>
        publish:
          - igene_panels: <% result().first().result.body.Panels %>
          - case_name: <% result().first().result.body.ParentSampleID %>
          - sample_info: <% dict(zip(ctx().sample_ids, result().select($.result.body))) %>
        do: generate_load_config



  generate_load_config:
    join: all
    action: gmc_norr_scout.generate_load_config
    input:
      case_id: <% ctx().case_id %>
      case_name: <% ctx().case_name %>
      sample_ids: <% ctx().sample_ids %>
      sample_files: <% ctx().sample_files %>
      sample_info: <% ctx().sample_info %>
      case_files: <% ctx().case_files %>
      pipeline: <% ctx().pipeline %>
      igene_panels: <% ctx().igene_panels %>
    next:
      - when: <% succeeded() %>
        publish:
          - load_config: <% result().result %>
        do: write_load_config

  write_load_config:
    action: gmc_norr_scout.write_load_config
    input:
      load_config: <% ctx().load_config %>
      output_path: <% ctx().output_path %>
      overwrite: true
    next:
      - when: <% succeeded() %>
        publish:
          - load_config_path: <% result().result.path %>
        do: load_case

  load_case:
    action: gmc_norr_scout.load_case
    input:
      load_config: <% ctx().load_config_path %>
    next:
      - when: <% succeeded() %>
        do: load_variants

  load_variants:
    action: gmc_norr_scout.load_variants
    input:
      variants: <% ctx().load_config.select(snv_vcf) %>
    
